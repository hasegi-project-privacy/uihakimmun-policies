<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의학입문 · 정책</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f1e6;--ink:#1b130a;--sub:#6b5d47;--muted:#8e8265;--rule:#d9cdb1;--gold:#b8893d;--surface:#fcf8ef;--jusa:#b33a2a;}
@media (prefers-color-scheme:dark){:root{--bg:#12100b;--ink:#f1e9d6;--sub:#b7ab91;--muted:#7e7359;--rule:#3a3327;--gold:#d4a45d;--surface:#1a1812;}}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif KR',serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{max-width:520px;width:100%;}
.tag{font-size:12px;letter-spacing:2px;color:var(--muted);}
h1{font-size:52px;font-weight:900;letter-spacing:6px;margin:12px 0 6px;}
.ko{font-size:20px;color:var(--ink);}
.desc{font-size:14px;color:var(--sub);margin:4px 0 18px;}
.rule{display:inline-block;width:34px;height:3px;background:var(--jusa);vertical-align:middle;}
.rule.s{width:7px;margin-left:5px;background:#c95c4a;}
.links{margin-top:26px;display:flex;flex-direction:column;gap:12px;}
a.link{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:var(--ink);
  background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:16px 18px;font-size:15px;}
a.link .han{font-weight:700;color:var(--gold);margin-right:10px;}
.foot{margin-top:30px;color:var(--muted);font-size:12.5px;line-height:1.7;}
</style>
</head>
<body>
<div class="card">
  <div class="tag">明 · 李梴 · 1575</div>
  <h1>醫學入門</h1>
  <div class="ko">의학입문</div>
  <div class="desc">고전 의서를 읽고 배우다</div>
  <span class="rule"></span><span class="rule s"></span>
  <div class="links">
    <a class="link" href="./privacy/"><span><span class="han">私</span>개인정보 처리방침</span><span>&rsaquo;</span></a>
    <a class="link" href="./terms/"><span><span class="han">約</span>이용약관</span><span>&rsaquo;</span></a>
  </div>
  <div class="foot">
    Hasegi Inc. · 개발팀<br>
    문의 hasegi.cs@gmail.com
  </div>
</div>
</body>
</html>
